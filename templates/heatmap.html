<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accident Heatmap — CrashAlert</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; height:100vh; overflow:hidden; background:#0f1117; }
        .leaflet-control-attribution { display:none !important; }

        /* Full screen map */
        #map { position:absolute; top:0; left:0; right:0; bottom:0; z-index:1; }

        /* Top bar */
        .topbar {
            position:fixed; top:0; left:0; right:0; height:56px; z-index:1000;
            background:rgba(15,17,23,0.92); backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; padding:0 20px; gap:16px;
        }
        .topbar-title { font-size:16px; font-weight:700; color:#e8eaf6; }
        .topbar-sub   { font-size:12px; color:#6b7090; }
        .topbar-spacer { flex:1; }
        .back-link {
            color:#9fa8da; text-decoration:none; font-size:13px; font-weight:500;
            padding:6px 14px; border:1px solid rgba(159,168,218,0.3); border-radius:7px;
            transition:all 0.2s; display:flex; align-items:center; gap:6px;
        }
        .back-link:hover { color:#fff; border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.06); }

        /* Stats bar */
        .stats-row {
            position:fixed; top:64px; left:50%; transform:translateX(-50%);
            display:flex; gap:10px; z-index:999; flex-wrap:wrap; justify-content:center;
            pointer-events:none;
        }
        .stat-chip {
            background:rgba(15,17,23,0.85); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.1); border-radius:20px;
            padding:6px 14px; font-size:12px; color:#c5cae9; font-weight:500;
        }

        /* Legend */
        .legend {
            position:fixed; bottom:30px; left:20px; z-index:999;
            background:rgba(15,17,23,0.9); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.1); border-radius:12px;
            padding:14px 16px; min-width:140px;
        }
        .legend-title { font-size:11px; font-weight:700; color:#9fa8da; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; }
        .legend-bar { height:10px; border-radius:5px; margin-bottom:6px; background:linear-gradient(to right, #1a9850, #fee08b, #f46d43, #d73027); }
        .legend-labels { display:flex; justify-content:space-between; font-size:10px; color:#6b7090; }

        /* Severity breakdown */
        .sev-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:11px; color:#c5cae9; }
        .sev-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

        /* Attribution */
        .map-attr { position:fixed; bottom:8px; right:8px; z-index:998; background:rgba(0,0,0,0.5); border-radius:5px; padding:3px 8px; font-size:10px; color:#666; }
    </style>
</head>
<body>

<div class="topbar">
    <div>
        <div class="topbar-title">Accident Heatmap</div>
        <div class="topbar-sub">Jaipur Region & NH-48 Corridor</div>
    </div>
    <div class="topbar-spacer"></div>
    <a href="/" class="back-link">← Back to Map</a>
</div>

<div class="stats-row">
    <div class="stat-chip" id="statTotal">Loading...</div>
    <div class="stat-chip">NH-48 Delhi–Jaipur Corridor</div>
    <div class="stat-chip">NCRB India Road Accident Data</div>
</div>

<div id="map"></div>

<div class="legend">
    <div class="legend-title">Accident Intensity</div>
    <div class="legend-bar"></div>
    <div class="legend-labels"><span>Low</span><span>High</span></div>
    <div style="margin-top:12px; margin-bottom:6px; font-size:10px; font-weight:700; color:#9fa8da; text-transform:uppercase; letter-spacing:0.5px;">Severity</div>
    <div class="sev-row"><div class="sev-dot" style="background:#43a047"></div>Low (1–2)</div>
    <div class="sev-row"><div class="sev-dot" style="background:#ffa726"></div>Moderate (3)</div>
    <div class="sev-row"><div class="sev-dot" style="background:#ef5350"></div>High (4–5)</div>
</div>

<div class="map-attr">© OpenStreetMap</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
    const accidents = {{ accidents|tojson|safe }};
    document.getElementById('statTotal').textContent = `${accidents.length} accident zones`;

    // Full-screen dark map
    const map = L.map('map', { attributionControl: false, zoomControl: true })
        .setView([26.9800, 75.9000], 10);  // centred between Jaipur & NH-48

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: ''
    }).addTo(map);

    // Build heatmap data — use severity as intensity weight
    const heatData = accidents.map(a => [
        a.latitude,
        a.longitude,
        (a.severity || 3) / 5.0   // normalise 1-5 to 0.2-1.0
    ]);

    if (heatData.length > 0) {
        L.heatLayer(heatData, {
            radius:     35,
            blur:       25,
            maxZoom:    17,
            max:        1.0,
            minOpacity: 0.35,
            gradient: {
                0.0:  '#0d47a1',
                0.2:  '#1a9850',
                0.4:  '#91cf60',
                0.6:  '#fee08b',
                0.8:  '#f46d43',
                1.0:  '#d73027'
            }
        }).addTo(map);
    }

    // Add severity-coded circle markers for top hotspots
    const HIGH_SEV = accidents.filter(a => (a.severity || 3) >= 4);
    HIGH_SEV.forEach((a, i) => {
        const color = a.severity === 5 ? '#ef5350' : '#ffa726';
        L.circleMarker([a.latitude, a.longitude], {
            radius:      a.severity === 5 ? 7 : 5,
            color:       color,
            fillColor:   color,
            fillOpacity: 0.8,
            weight:      1.5,
        }).addTo(map)
          .bindPopup(`<b>${a.zone || 'Accident Zone'}</b><br>Severity: ${a.severity}/5`);
    });

    // Try to show user location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            L.circleMarker([lat, lon], {
                radius: 8, color: '#5c6bc0', fillColor: '#7986cb',
                fillOpacity: 0.9, weight: 2
            }).addTo(map).bindPopup('Your current location');
        });
    }

    // Add route functionality
    let routeLayer = null;
    let landslideLayer = null;

    async function fetchAndDrawRoute(startLat, startLon, endLat, endLon) {
        try {
            const response = await fetch(`/route-risk?start=${startLon},${startLat}&end=${endLon},${endLat}&hour=12`);
            const data = await response.json();
            
            if (data.error) {
                console.error('Route error:', data.error);
                return;
            }

            // Clear existing routes
            if (routeLayer) map.removeLayer(routeLayer);
            if (landslideLayer) map.removeLayer(landslideLayer);

            // Draw the safest route
            const safestRoute = data.routes.find(r => r.is_safest) || data.routes[0];
            const coords = safestRoute.coordinates;
            
            routeLayer = L.polyline(coords, {
                color: '#4285f4',
                weight: 6,
                opacity: 0.8
            }).addTo(map);

            // Add markers
            L.marker(coords[0]).addTo(map).bindPopup('Start');
            L.marker(coords[coords.length - 1]).addTo(map).bindPopup('Destination');

            // Draw landslide overlay if hilly
            if (safestRoute.landslide && safestRoute.landslide.is_hilly) {
                const lsSegments = safestRoute.landslide.ls_segments;
                const landslideCoords = lsSegments
                    .filter(seg => seg.ls_risk > 0)
                    .map(seg => [seg.lat, seg.lon]);
                
                if (landslideCoords.length > 0) {
                    landslideLayer = L.polyline(landslideCoords, {
                        color: '#ff6b6b',
                        weight: 4,
                        opacity: 0.6,
                        dashArray: '8,6'
                    }).addTo(map).bindPopup('Landslide Risk Zone');
                }
            }

            // Fit map to route
            map.fitBounds(L.latLngBounds(coords), { padding: [50, 50] });

            // Show route info
            console.log(`Route: ${safestRoute.distance_km}km, Risk: ${safestRoute.risk_percent}%`);
            if (safestRoute.landslide && safestRoute.landslide.is_hilly) {
                console.log(`Landslide Risk: ${safestRoute.landslide.avg_risk}% in ${safestRoute.landslide.region}`);
            }

        } catch (error) {
            console.error('Error fetching route:', error);
        }
    }

    // Example: Delhi to Chamoli route
    fetchAndDrawRoute(28.6139, 77.2090, 30.4010, 79.3198);

    // Fit to all accident points
    if (accidents.length > 0) {
        const bounds = L.latLngBounds(accidents.map(a => [a.latitude, a.longitude]));
        map.fitBounds(bounds, { padding: [60, 60] });
    }
</script>
</body>
</html>
